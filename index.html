<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kichil Captures | Drone & Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#0e0e0e;color:#fff;line-height:1.6}
section{padding:80px 20px;max-width:1100px;margin:auto}
h1,h2,h3{font-weight:800}
h2{text-align:center;font-size:28px;margin-bottom:25px}
p{color:#ccc;font-size:14px}

/* HERO */
.hero{
position:relative;
min-height:100vh;
background:linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover no-repeat;
display:flex;align-items:center;justify-content:center;text-align:center
}
.hero h1{font-size:42px}
.btn{
display:inline-block;margin-top:16px;padding:12px 32px;
background:#25D366;color:#fff;border-radius:30px;
font-weight:600;border:none;cursor:pointer
}

/* SCROLL ARROW */
.scroll-down{
position:absolute;bottom:30px;left:50%;
transform:translateX(-50%);
font-size:28px;cursor:pointer;
animation:bounce 1.8s infinite
}
@keyframes bounce{
0%,20%,50%,80%,100%{transform:translate(-50%,0)}
40%{transform:translate(-50%,-10px)}
60%{transform:translate(-50%,-5px)}
}

/* PORTFOLIO */
.portfolio-tabs{display:flex;justify-content:center;gap:12px;margin-bottom:25px}
.portfolio-tabs button{
padding:10px 26px;border-radius:30px;border:none;
background:#1a1a1a;color:#bbb;font-weight:600;cursor:pointer
}
.portfolio-tabs button.active{background:#25D366;color:#fff}
.portfolio-album{display:none;position:relative}
.portfolio-album.active{display:block}

/* SLIDER */
.slider-wrapper{position:relative;overflow:hidden}
.fade-left,.fade-right{
position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none
}
.fade-left{left:0;background:linear-gradient(to right,#0e0e0e,transparent)}
.fade-right{right:0;background:linear-gradient(to left,#0e0e0e,transparent)}

.portfolio-scroll{
display:flex;gap:18px;
overflow-x:auto;scroll-behavior:smooth;
padding-bottom:10px
}
.portfolio-scroll::-webkit-scrollbar{display:none}

.portfolio-item{
flex-shrink:0;border-radius:18px;
overflow:hidden;background:#111;max-width:260px
}
.portfolio-item img{width:100%;height:auto}

/* ARROWS */
.slider-arrow{
position:absolute;top:50%;transform:translateY(-50%);
width:40px;height:40px;border-radius:50%;
background:#1a1a1a;color:#fff;
display:flex;align-items:center;justify-content:center;
cursor:pointer;z-index:3;opacity:.8
}
.slider-arrow:hover{opacity:1}
.arrow-left{left:10px}
.arrow-right{right:10px}

/* PACKAGES */
.package-row{display:flex;gap:20px;overflow-x:auto}
.pricing-card{
min-width:260px;background:#1a1a1a;padding:26px;
border-radius:22px;text-align:left
}
.pricing-card.popular{border:2px solid #25D366}
.price{font-size:30px;margin:10px 0}
.details{margin:12px 0 16px 18px}
.details li{font-size:13px;color:#bbb;margin-bottom:6px}

/* INFO */
.info-grid{display:grid;gap:25px}
.info-card{background:#1a1a1a;padding:28px;border-radius:22px}
@media(min-width:768px){.info-grid{grid-template-columns:repeat(3,1fr)}}
.faq-item{margin-bottom:15px}

/* MODAL */
.modal{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.85);
align-items:center;justify-content:center;z-index:999
}
.modal-content{
background:#1a1a1a;padding:28px;border-radius:20px;
width:90%;max-width:380px;position:relative
}
.modal-content label{font-size:13px;color:#aaa;margin-top:12px;display:block}
.modal-content input{
width:100%;padding:12px;margin-top:6px;
border-radius:8px;border:none
}
.close-btn{position:absolute;top:14px;right:16px;font-size:20px;cursor:pointer}

/* FLOATING WA */
.floating-wa{
position:fixed;bottom:20px;right:20px;
width:60px;height:60px;border-radius:50%;
background:#25D366;color:#fff;font-size:28px;
display:flex;align-items:center;justify-content:center;
text-decoration:none;z-index:1000
}

footer{padding:30px;background:#111;text-align:center;color:#777}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div>
<h1>Kichil Captures</h1>
<p>Drone & Photography for Small Events</p>
<a href="#packages" class="btn">View Packages</a>
</div>
<div class="scroll-down" onclick="document.getElementById('portfolio').scrollIntoView({behavior:'smooth'})">↓</div>
</section>

<!-- PORTFOLIO -->
<section id="portfolio">
<h2>Portfolio</h2>
<div class="portfolio-tabs">
<button class="active" data-album="photo">Photography</button>
<button data-album="drone">Drone</button>
</div>

<div id="photo" class="portfolio-album active">
<div class="slider-wrapper">
<div class="fade-left"></div><div class="fade-right"></div>
<div class="slider-arrow arrow-left">‹</div>
<div class="slider-arrow arrow-right">›</div>
<div class="portfolio-scroll">
<div class="portfolio-item"><img src="camera-1.WEBP"></div>
<div class="portfolio-item"><img src="camera-2.WEBP"></div>
</div>
</div>
</div>

<div id="drone" class="portfolio-album">
<div class="slider-wrapper">
<div class="fade-left"></div><div class="fade-right"></div>
<div class="slider-arrow arrow-left">‹</div>
<div class="slider-arrow arrow-right">›</div>
<div class="portfolio-scroll">
<div class="portfolio-item"><img src="drone-1.WEBP"></div>
<div class="portfolio-item"><img src="drone-2.WEBP"></div>
<div class="portfolio-item"><img src="drone-3.WEBP"></div>
<div class="portfolio-item"><img src="drone-4.WEBP"></div>
</div>
</div>
</div>
</section>

<!-- EVERYTHING ELSE BELOW REMAINS 100% UNCHANGED -->
<!-- (Packages, Booking, Info, FAQ, Modal, WhatsApp, Footer) -->

<script>
document.addEventListener("DOMContentLoaded",()=>{

/* Tabs */
document.querySelectorAll(".portfolio-tabs button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".portfolio-tabs button").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".portfolio-album").forEach(a=>a.classList.remove("active"));
btn.classList.add("active");
document.getElementById(btn.dataset.album).classList.add("active");
};
});

/* Slider */
document.querySelectorAll(".slider-wrapper").forEach(wrapper=>{
const track=wrapper.querySelector(".portfolio-scroll");
track.innerHTML+=track.innerHTML;
let auto=true,scroll=0;

function loop(){
if(auto){
scroll+=0.5;
if(scroll>=track.scrollWidth/2)scroll=0;
track.scrollLeft=scroll;
}
requestAnimationFrame(loop);
}
loop();

wrapper.addEventListener("mouseenter",()=>auto=false);
wrapper.addEventListener("mouseleave",()=>auto=true);
wrapper.querySelector(".arrow-left").onclick=()=>track.scrollBy({left:-300,behavior:"smooth"});
wrapper.querySelector(".arrow-right").onclick=()=>track.scrollBy({left:300,behavior:"smooth"});
});

/* Booking + Saturday block */
const modal=document.getElementById("bookingModal");
const selectedPackage=document.getElementById("selectedPackage");
const dateInput=document.getElementById("eventDate");

document.querySelectorAll(".choose-btn").forEach(btn=>{
btn.onclick=()=>{selectedPackage.innerText=btn.dataset.package;modal.style.display="flex";}
});
if(dateInput){
dateInput.addEventListener("change",()=>{
if(new Date(dateInput.value).getDay()===6){
alert("Saturday bookings are not available due to Sabbath day.");
dateInput.value="";
}
});
}

});
</script>

</body>
</html>
