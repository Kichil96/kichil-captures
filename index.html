<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kichil Captures | Drone & Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#0e0e0e;color:#fff;line-height:1.6}
section{padding:80px 20px;max-width:1100px;margin:auto}
h1,h2,h3{font-weight:800}
h2{text-align:center;font-size:28px;margin-bottom:25px}
p{color:#ccc;font-size:15px}

.hero{
min-height:100vh;
background:linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover no-repeat;
display:flex;align-items:center;justify-content:center;text-align:center
}
.hero h1{font-size:42px}
.btn{
display:inline-block;margin-top:18px;padding:12px 32px;
background:#25D366;color:#fff;border-radius:30px;
font-weight:600;border:none;cursor:pointer;text-decoration:none
}
.btn.disabled{background:#444;cursor:not-allowed}

/* Portfolio */
.portfolio-tabs{display:flex;justify-content:center;gap:12px;margin-bottom:25px}
.portfolio-tabs button{
padding:10px 26px;border-radius:30px;border:none;
background:#1a1a1a;color:#bbb;font-weight:600;cursor:pointer
}
.portfolio-tabs button.active{background:#25D366;color:#fff}
.portfolio-album{display:none}
.portfolio-album.active{display:block}
.portfolio-scroll{display:flex;gap:18px;overflow-x:auto;padding-bottom:10px}
.portfolio-item{
flex-shrink:0;border-radius:18px;overflow:hidden;background:#111;
max-width:260px
}
.portfolio-item img{width:100%;height:auto;display:block}

/* Packages */
.package-row{display:flex;gap:20px;overflow-x:auto;padding-bottom:10px}
.pricing-card{
min-width:260px;background:#1a1a1a;padding:26px;
border-radius:22px;text-align:center
}
.pricing-card.popular{border:2px solid #25D366}
.price{font-size:32px;margin:15px 0}

/* Info */
.info-grid{display:grid;gap:25px}
.info-card{background:#1a1a1a;padding:28px;border-radius:22px}
@media(min-width:768px){.info-grid{grid-template-columns:repeat(3,1fr)}}
.faq-item{margin-bottom:15px}
.faq-item strong{display:block;margin-bottom:5px}

/* Modal */
.modal{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.85);
align-items:center;justify-content:center;z-index:999
}
.modal-content{
position:relative;background:#1a1a1a;padding:28px;
border-radius:20px;width:90%;max-width:380px
}
.modal-content label{font-size:13px;color:#aaa;display:block;margin-top:12px}
.modal-content input{
width:100%;padding:12px;margin-top:6px;
border-radius:8px;border:none;font-size:14px
}
.modal-note{font-size:12px;color:#777;margin-top:4px}
.close-btn{
position:absolute;top:14px;right:16px;
font-size:20px;cursor:pointer;color:#aaa
}
.close-btn:hover{color:#fff}

/* Floating WA */
.floating-wa{
position:fixed;bottom:20px;right:20px;
width:60px;height:60px;border-radius:50%;
background:#25D366;display:flex;align-items:center;
justify-content:center;font-size:28px;color:#fff;
text-decoration:none;box-shadow:0 4px 15px rgba(0,0,0,.4);
z-index:1000
}

footer{padding:30px;background:#111;text-align:center;color:#777}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div>
<h1>Kichil Captures</h1>
<p>Drone & Photography for Small Events</p>
<a href="#packages" class="btn">View Packages</a>
</div>
</section>

<!-- PORTFOLIO -->
<section>
<h2>Portfolio</h2>
<div class="portfolio-tabs">
<button class="active" onclick="showAlbum('photo',this)">Photography</button>
<button onclick="showAlbum('drone',this)">Drone</button>
</div>

<div id="photo" class="portfolio-album active">
<div class="portfolio-scroll">
<div class="portfolio-item"><img src="camera-1.WEBP"></div>
<div class="portfolio-item"><img src="camera-2.WEBP"></div>
</div>
</div>

<div id="drone" class="portfolio-album">
<div class="portfolio-scroll">
<div class="portfolio-item"><img src="drone-1.WEBP"></div>
<div class="portfolio-item"><img src="drone-2.WEBP"></div>
<div class="portfolio-item"><img src="drone-3.WEBP"></div>
<div class="portfolio-item"><img src="drone-4.WEBP"></div>
</div>
</div>
</section>

<!-- PACKAGES -->
<section id="packages">
<h2>🔥 Combo Package</h2>
<div class="package-row">
<div class="pricing-card popular">
<h3>Photo + Drone Combo</h3>
<div class="price">RM280</div>
<button class="btn" onclick="openModal('Photo + Drone Combo – RM280')">Choose Package</button>
</div>
</div>
</section>

<!-- MODAL -->
<div class="modal" id="bookingModal">
<div class="modal-content">
<span class="close-btn" onclick="closeModal()">✕</span>
<h3 id="selectedPackage"></h3>

<label>Your Name</label>
<input id="clientName">

<label>Event Location</label>
<input id="eventLocation">

<label>Event Date</label>
<input type="date" id="eventDate">
<div class="modal-note">Saturday unavailable (Sabbath)</div>

<button id="confirmBtn" class="btn disabled" disabled onclick="sendWhatsApp()">Confirm Booking</button>
</div>
</div>

<a href="https://wa.me/601139346782" class="floating-wa">💬</a>

<footer>© 2026 Kichil Captures</footer>

<script>

/* Fix: Proper element reference */
const bookingModal = document.getElementById("bookingModal");
const selectedPackageEl = document.getElementById("selectedPackage");
const clientName = document.getElementById("clientName");
const eventLocation = document.getElementById("eventLocation");
const eventDate = document.getElementById("eventDate");
const confirmBtn = document.getElementById("confirmBtn");

let selectedPackage = "";

function showAlbum(album,btn){
document.querySelectorAll('.portfolio-album').forEach(a=>a.classList.remove('active'));
document.querySelectorAll('.portfolio-tabs button').forEach(b=>b.classList.remove('active'));
document.getElementById(album).classList.add('active');
btn.classList.add('active');
}

function openModal(pkg){
selectedPackage = pkg;
selectedPackageEl.innerText = pkg;
bookingModal.style.display = "flex";
validateForm();
}

function closeModal(){
bookingModal.style.display = "none";
}

/* Block Saturday */
eventDate.addEventListener("change",()=>{
const d=new Date(eventDate.value);
if(d.getDay()===6){
alert("Saturday unavailable.");
eventDate.value="";
}
validateForm();
});

clientName.addEventListener("input",validateForm);
eventLocation.addEventListener("input",validateForm);

function validateForm(){
if(clientName.value && eventLocation.value && eventDate.value){
confirmBtn.disabled=false;
confirmBtn.classList.remove("disabled");
}else{
confirmBtn.disabled=true;
confirmBtn.classList.add("disabled");
}
}

function sendWhatsApp(){
const msg=`Hello Kichil Captures,

Package: ${selectedPackage}
Name: ${clientName.value}
Location: ${eventLocation.value}
Date: ${eventDate.value}`;

window.open(`https://wa.me/601139346782?text=${encodeURIComponent(msg)}`,"_blank");
closeModal();
}

window.onclick = function(e){
if(e.target === bookingModal){
closeModal();
}
}

</script>

</body>
</html>
