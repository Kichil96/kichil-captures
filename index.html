<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kichil Captures | Drone & Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#0e0e0e;color:#fff;line-height:1.6}

section{padding:80px 20px;max-width:1100px;margin:auto}
h1,h2,h3{font-weight:800}
h2{text-align:center;font-size:28px;margin-bottom:25px}
p{color:#ccc;font-size:15px}

.hero{
min-height:100vh;
background:linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover no-repeat;
display:flex;align-items:center;justify-content:center;text-align:center
}
.hero h1{font-size:42px}
.hero p{margin-top:12px}

.btn{
display:inline-block;margin-top:18px;padding:12px 32px;
background:#25D366;color:#fff;border-radius:30px;
font-weight:600;border:none;cursor:pointer;text-decoration:none
}

/* ===== PORTFOLIO (unchanged) ===== */
.portfolio-tabs{display:flex;justify-content:center;gap:12px;margin-bottom:25px}
.portfolio-tabs button{
padding:10px 26px;border-radius:30px;border:none;
background:#1a1a1a;color:#bbb;font-weight:600;cursor:pointer
}
.portfolio-tabs button.active{background:#25D366;color:#fff}

.portfolio-album{display:none}
.portfolio-album.active{display:block}

.portfolio-scroll{
display:flex;gap:18px;overflow-x:auto;padding-bottom:10px;
scroll-snap-type:x mandatory
}

.portfolio-item{
flex-shrink:0;border-radius:18px;overflow:hidden;
background:#111;scroll-snap-align:start
}
.photo .portfolio-item{width:220px;aspect-ratio:3/4}
.drone .portfolio-item{width:320px;aspect-ratio:16/9}
.portfolio-item img{width:100%;height:100%;object-fit:cover}

/* ===== PACKAGE SCROLL ===== */
.package-row{
display:flex;gap:20px;overflow-x:auto;padding-bottom:10px;
scroll-snap-type:x mandatory
}
.pricing-card{
min-width:260px;background:#1a1a1a;padding:26px;
border-radius:22px;text-align:center;scroll-snap-align:start
}
.pricing-card.popular{border:2px solid #25D366}
.price{font-size:32px;margin:15px 0}

/* ===== INFO ===== */
.info-grid{display:grid;gap:25px}
.info-card{background:#1a1a1a;padding:28px;border-radius:22px}
@media(min-width:768px){.info-grid{grid-template-columns:repeat(3,1fr)}}

/* ===== MODAL ===== */
.modal{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.85);
align-items:center;justify-content:center;z-index:999
}

.modal-content{
position:relative;
background:#1a1a1a;padding:28px;border-radius:20px;
width:90%;max-width:380px;text-align:left
}

.modal-content h3{text-align:center;margin-bottom:15px}

.modal-content label{
font-size:13px;color:#aaa;margin-top:12px;display:block
}

.modal-content input{
width:100%;padding:12px;margin-top:6px;
border-radius:8px;border:none;font-size:14px
}

.modal-note{
font-size:12px;color:#777;margin-top:4px
}

/* Close button */
.close-btn{
position:absolute;
top:14px;
right:16px;
font-size:20px;
cursor:pointer;
color:#aaa
}
.close-btn:hover{color:#fff}

/* Floating WhatsApp */
.floating-wa{
position:fixed;bottom:20px;right:20px;
width:60px;height:60px;border-radius:50%;
background:#25D366;display:flex;
align-items:center;justify-content:center;
font-size:28px;color:#fff;text-decoration:none;
box-shadow:0 4px 15px rgba(0,0,0,.4);z-index:1000
}

footer{
padding:30px;background:#111;text-align:center;
color:#777;font-size:14px
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div>
<h1>Kichil Captures</h1>
<p>Drone & Photography for Small Events</p>
<a href="#packages" class="btn">View Packages</a>
</div>
</section>

<!-- PORTFOLIO -->
<section>
<h2>Portfolio</h2>

<div class="portfolio-tabs">
<button class="active" onclick="showAlbum('photo',this)">Photography</button>
<button onclick="showAlbum('drone',this)">Drone</button>
</div>

<div id="photo" class="portfolio-album active photo">
<div class="portfolio-scroll">
<div class="portfolio-item"><img src="camera-1.WEBP" loading="lazy"></div>
<div class="portfolio-item"><img src="camera-2.WEBP" loading="lazy"></div>
</div>
</div>

<div id="drone" class="portfolio-album drone">
<div class="portfolio-scroll">
<div class="portfolio-item"><img src="drone-1.WEBP" loading="lazy"></div>
<div class="portfolio-item"><img src="drone-2.WEBP" loading="lazy"></div>
<div class="portfolio-item"><img src="drone-3.WEBP" loading="lazy"></div>
<div class="portfolio-item"><img src="drone-4.WEBP" loading="lazy"></div>
</div>
</div>
</section>

<!-- PACKAGES (unchanged, shortened for clarity) -->
<section id="packages">
<h2>🔥 Combo Package</h2>
<div class="package-row">
<div class="pricing-card popular">
<h3>Photo + Drone Combo</h3>
<div class="price">RM280</div>
<button class="btn" onclick="openModal('Photo + Drone Combo – RM280')">Choose Package</button>
</div>
</div>
</section>

<!-- MODAL -->
<div class="modal" id="bookingModal">
<div class="modal-content">
<span class="close-btn" onclick="closeModal()">✕</span>

<h3 id="selectedPackage"></h3>

<label>Your Name</label>
<input type="text" id="clientName" placeholder="Enter your name">

<label>Event Location</label>
<input type="text" id="eventLocation" placeholder="e.g. Kota Kinabalu">

<label>Event Date</label>
<input type="date" id="eventDate">
<div class="modal-note">Saturday unavailable (Sabbath)</div>

<button class="btn" style="width:100%" onclick="sendWhatsApp()">Confirm Booking</button>
</div>
</div>

<a href="https://wa.me/601139346782" class="floating-wa">💬</a>

<footer>© 2026 Kichil Captures</footer>

<script>
function showAlbum(album,btn){
document.querySelectorAll('.portfolio-album').forEach(a=>a.classList.remove('active'));
document.querySelectorAll('.portfolio-tabs button').forEach(b=>b.classList.remove('active'));
document.getElementById(album).classList.add('active');
btn.classList.add('active');
}

let selectedPackage="";
function openModal(pkg){
selectedPackage=pkg;
document.getElementById("selectedPackage").innerText=pkg;
document.getElementById("bookingModal").style.display="flex";
}

function closeModal(){
document.getElementById("bookingModal").style.display="none";
}

document.getElementById("eventDate").addEventListener("change",function(){
const d=new Date(this.value);
if(d.getDay()===6){
alert("Bookings are not available on Saturdays.");
this.value="";
}
});

function sendWhatsApp(){
const msg=`Hello Kichil Captures,

Package: ${selectedPackage}
Name: ${clientName.value}
Location: ${eventLocation.value}
Date: ${eventDate.value}`;

window.open(`https://wa.me/601139346782?text=${encodeURIComponent(msg)}`,"_blank");
closeModal();
}

window.onclick=e=>{
if(e.target===document.getElementById("bookingModal")){
closeModal();
}
}
</script>

</body>
</html>
